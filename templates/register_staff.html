{% extends "base.html" %}
{% block title %}Staff registration · SkyWay{% endblock %}

{% block content %}
<main class="form-wrap">
  <div class="form-panel">
    <h1>Airline staff registration</h1>
    <p class="sub">All fields match the project's Airline Staff entity.</p>

    <form action="{{ url_for('register_staff') }}" method="post">
      <h4 class="form-section">Account</h4>
      <div class="form-grid">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="field">
          <label for="airline_name">Airline name</label>
          <input type="text" id="airline_name" name="airline_name" required />
        </div>
      </div>

      <h4 class="form-section">Personal</h4>
      <div class="form-grid">
        <div class="field">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" required />
        </div>
        <div class="field">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" required />
        </div>
        <div class="field">
          <label for="date_of_birth">Date of birth</label>
          <input type="date" id="date_of_birth" name="date_of_birth" />
        </div>
      </div>

      <h4 class="form-section">Phone numbers (one or more)</h4>
      <div class="phone-list" id="phone-list">
        <div class="field"><input type="text" name="phone_number" placeholder="Phone number" /></div>
      </div>
      <button class="btn ghost small" type="button" id="add-phone">+ Add another phone</button>

      <div class="filter-actions">
        <button class="btn" type="submit">Create account</button>
        <a class="btn ghost" href="{{ url_for('register') }}">Back</a>
      </div>
    </form>
  </div>
</main>

<script>
  document.getElementById("add-phone").addEventListener("click", () => {
    const wrap = document.createElement("div");
    wrap.className = "field";
    wrap.innerHTML = '<input type="text" name="phone_number" placeholder="Phone number" />';
    document.getElementById("phone-list").appendChild(wrap);
  });
</script>
{% endblock %}
