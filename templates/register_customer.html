{% extends "base.html" %}
{% block title %}Customer registration · SkyWay{% endblock %}

{% block content %}
<main class="form-wrap">
  <div class="form-panel">
    <h1>Customer registration</h1>
    <p class="sub">All fields match the project's Customer entity.</p>

    <form action="{{ url_for('register_customer') }}" method="post">
      <h4 class="form-section">Account</h4>
      <div class="form-grid">
        <div class="field">
          <label for="email">Email (used as username)</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <div class="field">
          <label for="phone_number">Phone number</label>
          <input type="text" id="phone_number" name="phone_number" />
        </div>
      </div>

      <h4 class="form-section">Address</h4>
      <div class="form-grid">
        <div class="field">
          <label for="building_number">Building number</label>
          <input type="text" id="building_number" name="building_number" />
        </div>
        <div class="field">
          <label for="street">Street</label>
          <input type="text" id="street" name="street" />
        </div>
        <div class="field">
          <label for="city">City</label>
          <input type="text" id="city" name="city" />
        </div>
        <div class="field">
          <label for="state">State</label>
          <input type="text" id="state" name="state" />
        </div>
      </div>

      <h4 class="form-section">Passport & personal</h4>
      <div class="form-grid">
        <div class="field">
          <label for="passport_number">Passport number</label>
          <input type="text" id="passport_number" name="passport_number" />
        </div>
        <div class="field">
          <label for="passport_country">Passport country</label>
          <input type="text" id="passport_country" name="passport_country" />
        </div>
        <div class="field">
          <label for="passport_expiration">Passport expiration</label>
          <input type="date" id="passport_expiration" name="passport_expiration" />
        </div>
        <div class="field">
          <label for="date_of_birth">Date of birth</label>
          <input type="date" id="date_of_birth" name="date_of_birth" />
        </div>
      </div>

      <div class="filter-actions">
        <button class="btn" type="submit">Create account</button>
        <a class="btn ghost" href="{{ url_for('register') }}">Back</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
