{% extends "base.html" %}
{% block title %}Create flight · SkyWay Staff{% endblock %}

{% block content %}
<main class="form-wrap">
  <div class="form-panel">
    <h1>Create a new flight</h1>
    <p class="sub">For your airline. The flight is identified by number + departure date/time.</p>

    <form action="{{ url_for('staff_create_flight') }}" method="post">
      <div class="form-grid">
        <div class="field">
          <label for="flight_number">Flight number</label>
          <input type="text" id="flight_number" name="flight_number" required />
        </div>
        <div class="field">
          <label for="base_price">Base price</label>
          <input type="number" id="base_price" name="base_price" min="0" step="0.01" required />
        </div>

        <div class="field">
          <label for="departure_airport">Departure airport</label>
          <input list="airports" id="departure_airport" name="departure_airport" placeholder="Type to search…" required />
        </div>
        <div class="field">
          <label for="arrival_airport">Arrival airport</label>
          <input list="airports" id="arrival_airport" name="arrival_airport" placeholder="Type to search…" required />
        </div>

      <datalist id="airports">
        {% for ap in airports %}
        <option value="{{ ap.name }}">{{ ap.city }}, {{ ap.country }}</option>
        {% endfor %}
      </datalist>

        <div class="field">
          <label for="departure_datetime">Departure date &amp; time</label>
          <input type="datetime-local" id="departure_datetime" name="departure_datetime" required />
        </div>
        <div class="field">
          <label for="arrival_datetime">Arrival date &amp; time</label>
          <input type="datetime-local" id="arrival_datetime" name="arrival_datetime" required />
        </div>

        <div class="field">
          <label for="airplane_id">Airplane</label>
          <select id="airplane_id" name="airplane_id" required>
            <option value="">— Select airplane —</option>
            {% for a in airplanes %}
            <option value="{{ a.airplane_id }}">
              #{{ a.airplane_id }} · {{ a.num_seats }} seats · {{ a.manufacturer }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label for="status">Status</label>
          <select id="status" name="status">
            <option value="on-time">On-time</option>
            <option value="delayed">Delayed</option>
          </select>
        </div>
      </div>

      <div class="filter-actions">
        <button class="btn" type="submit">Create flight</button>
        <a class="btn ghost" href="{{ url_for('staff_view_flights') }}"
           style="display:inline-flex;align-items:center;justify-content:center;height:48px;text-decoration:none;">Cancel</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
